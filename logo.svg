<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="36" fill="url(#bg)"/>
  
  <!-- Flask icon -->
  <g transform="translate(100,32)">
    <!-- Neck -->
    <rect x="-8" y="0" width="16" height="30" rx="3" fill="white" opacity="0.9"/>
    <!-- Body (triangle shape) -->
    <path d="M-28,30 L28,30 L16,90 L-16,90 Z" fill="white" opacity="0.15"/>
    <!-- Liquid -->
    <path d="M-14,60 L14,60 L10,88 L-10,88 Z" fill="url(#wave)" opacity="0.7">
      <animate attributeName="d" values="M-14,60 L14,60 L10,88 L-10,88 Z;M-14,58 L14,62 L10,88 L-10,88 Z;M-14,60 L14,60 L10,88 L-10,88 Z" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom -->
    <rect x="-16" y="88" width="32" height="4" rx="2" fill="white" opacity="0.8"/>
    <!-- Bubbles -->
    <circle cx="-4" cy="78" r="2" fill="white" opacity="0.6">
      <animate attributeName="cy" values="78;70;60" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="72" r="1.5" fill="white" opacity="0.5">
      <animate attributeName="cy" values="72;62;52" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Text -->
  <text x="100" y="135" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="800" fill="white" letter-spacing="1">Smart</text>
  <text x="100" y="165" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="300" fill="rgba(255,255,255,0.85)" letter-spacing="1">Lab</text>
</svg>
